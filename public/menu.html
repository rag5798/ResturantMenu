<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu</title>
    <link rel="stylesheet" href="menu.css" />
</head>
<body>
    <nav id="topbar">
        <span class="brand">Bistro</span>
        <div class="nav-links">
            <a href="/">Menu</a>
            <a href="/order-status">My Order</a>
        </div>
        <button id="cartBtn" aria-label="Open cart" aria-expanded="false" aria-controls="cartSidebar">
            Cart (<span id="cartCount" aria-live="polite">0</span>)
        </button>
    </nav>

    <h1>Menu</h1>

    <!-- Estimated wait time banner -->
    <div id="wait-time-banner" class="wait-time-banner hidden">
      <span>Est. wait time: </span><strong id="wait-time-text"></strong>
    </div>

    <!-- Category filter tabs -->
    <div id="categoryTabs" role="tablist" aria-label="Menu categories">
        <button class="tab active" data-category="all" role="tab" aria-selected="true">All</button>
    </div>

    <!-- Menu grid -->
    <div id="menucon" role="region" aria-label="Menu items">
        <div id="menu-loading" class="loading-state">
            <div class="spinner"></div>
            <p>Loading menu...</p>
        </div>
    </div>

    <!-- Error state (shown if menu fetch fails) -->
    <div id="menu-error" class="error-state hidden">
        <p>Could not load menu. Please try again.</p>
        <button id="retry-btn">Retry</button>
    </div>

    <!-- Cart sidebar -->
    <div id="cartOverlay" class="hidden" aria-hidden="true"></div>
    <aside id="cartSidebar" class="hidden" role="dialog" aria-label="Shopping cart" tabindex="-1">
        <h2>Your Order</h2>
        <div id="cartItems"></div>
        <div id="cartFooter" class="hidden">
            <div id="cartTotal">Total: $0.00</div>
            <button id="checkoutBtn">Proceed to Checkout</button>
        </div>
        <p id="cartEmpty">Your cart is empty.</p>
    </aside>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

    <script src="menu.js"></script>
</body>
</html>
